<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Edge Detection – HTML5 Canvas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f1a;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
      gap: 20px;
    }

    header {
      text-align: center;
    }
    header h1 {
      font-size: 1.8rem;
      color: #60c8ff;
      letter-spacing: 1px;
    }
    header p {
      color: #aaa;
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .panels {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      width: 100%;
      max-width: 1300px;
    }

    .panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .panel-label {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #60c8ff;
      padding: 4px 14px;
      border: 1px solid #60c8ff44;
      border-radius: 20px;
      background: #60c8ff11;
    }

    video, canvas {
      width: 560px;
      height: 315px;
      background: #000;
      border-radius: 8px;
      border: 2px solid #333;
    }

    canvas { border-color: #60c8ff55; }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 8px 22px;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    button:hover { opacity: .85; }
    #btnPlay  { background: #28a745; color: #fff; }
    #btnPause { background: #dc3545; color: #fff; }

    .upload-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: #1e1e2e;
      border-radius: 8px;
      border: 1px dashed #555;
    }
    .upload-area label {
      color: #60c8ff;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .upload-area label:hover { text-decoration: underline; }
    #fileInput { display: none; }
    #fileName  { color: #aaa; font-size: 0.85rem; }

    .filter-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .filter-row label { font-size: 0.85rem; color: #ccc; }
    .filter-row select {
      padding: 5px 10px;
      background: #1e1e2e;
      color: #eee;
      border: 1px solid #555;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .threshold-row {
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 0.85rem;
      color: #ccc;
    }
    #threshRange { width: 120px; }
    #threshValue { color: #60c8ff; font-weight: 700; min-width: 28px; }

    .fps-badge {
      font-size: 0.8rem;
      color: #888;
    }
    #fpsNum { color: #ffd700; font-weight: 700; }

    footer {
      color: #555;
      font-size: 0.78rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<header>
  <h1>🎬 Video Edge Detection</h1>
  <p>HTML5 Canvas + Sobel Filter – Real-time per frame</p>
</header>

<!-- upload & filter controls -->
<div class="controls">
  <div class="upload-area">
    <label for="fileInput">📂 Chọn video</label>
    <input type="file" id="fileInput" accept="video/*" />
    <span id="fileName">chưa chọn file</span>
  </div>
</div>

<div class="filter-row">
  <label>Bộ lọc biên cạnh:</label>
  <select id="filterType">
    <option value="sobel">Sobel (grayscale)</option>
    <option value="sobel-color">Sobel (color)</option>
    <option value="laplacian">Laplacian</option>
  </select>

  <div class="threshold-row">
    <label>Ngưỡng:</label>
    <input type="range" id="threshRange" min="0" max="200" value="30" />
    <span id="threshValue">30</span>
  </div>
</div>

<!-- main panels -->
<div class="panels">
  <div class="panel">
    <div class="panel-label">🎥 Video gốc</div>
    <video id="myVideo" controls crossorigin="anonymous">
      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4" />
      Trình duyệt không hỗ trợ video.
    </video>
  </div>

  <div class="panel">
    <div class="panel-label">🔍 Biên cạnh (Canvas)</div>
    <canvas id="myCanvas" width="560" height="315"></canvas>
  </div>
</div>

<div class="controls">
  <button id="btnPlay">▶ Play</button>
  <button id="btnPause">⏸ Pause</button>
  <span class="fps-badge">FPS thực: <span id="fpsNum">0</span></span>
</div>

<footer>HCMUS – Application Graphics – Web Graphics Environment</footer>

<script>
  /* ============================================================
     Elements
  ============================================================ */
  const video      = document.getElementById('myVideo');
  const canvas     = document.getElementById('myCanvas');
  const ctx        = canvas.getContext('2d', { willReadFrequently: true });
  const fileInput  = document.getElementById('fileInput');
  const filterSel  = document.getElementById('filterType');
  const threshRange= document.getElementById('threshRange');
  const threshValue= document.getElementById('threshValue');
  const fpsNum     = document.getElementById('fpsNum');

  const W = canvas.width;   // 560
  const H = canvas.height;  // 315

  let animId   = null;
  let lastTime = 0;
  let fpsSmooth = 0;

  /* ============================================================
     Upload local video
  ============================================================ */
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    document.getElementById('fileName').textContent = file.name;
    const url = URL.createObjectURL(file);
    video.src = url;
    video.load();
  });

  threshRange.addEventListener('input', () => {
    threshValue.textContent = threshRange.value;
  });

  /* ============================================================
     Play / Pause buttons
  ============================================================ */
  document.getElementById('btnPlay').onclick  = () => video.play();
  document.getElementById('btnPause').onclick = () => video.pause();

  /* ============================================================
     Animation loop
  ============================================================ */
  function loop(ts) {
    animId = requestAnimationFrame(loop);

    // FPS counter
    if (lastTime) {
      const dt = ts - lastTime;
      fpsSmooth = fpsSmooth * 0.9 + (1000 / dt) * 0.1;
      fpsNum.textContent = fpsSmooth.toFixed(1);
    }
    lastTime = ts;

    if (video.paused || video.ended || video.readyState < 2) return;

    // Draw video frame onto canvas (scaled to canvas size)
    ctx.drawImage(video, 0, 0, W, H);

    // Get pixel data
    const frame = ctx.getImageData(0, 0, W, H);
    const output = ctx.createImageData(W, H);

    const filter = filterSel.value;
    const thresh = parseInt(threshRange.value);

    if (filter === 'sobel') {
      applySobel(frame, output, thresh, false);
    } else if (filter === 'sobel-color') {
      applySobel(frame, output, thresh, true);
    } else {
      applyLaplacian(frame, output, thresh);
    }

    ctx.putImageData(output, 0, 0);
  }

  /* ============================================================
     Sobel edge detection
  ============================================================ */
  function applySobel(src, dst, thresh, color) {
    const d  = src.data;
    const od = dst.data;
    const w  = src.width;
    const h  = src.height;

    // Sobel kernels
    const Kx = [-1, 0, 1, -2, 0, 2, -1, 0, 1];
    const Ky = [-1,-2,-1,  0, 0, 0,  1, 2, 1];

    for (let y = 1; y < h - 1; y++) {
      for (let x = 1; x < w - 1; x++) {
        let gxR=0, gyR=0, gxG=0, gyG=0, gxB=0, gyB=0;

        for (let ky = -1; ky <= 1; ky++) {
          for (let kx = -1; kx <= 1; kx++) {
            const idx = ((y + ky) * w + (x + kx)) * 4;
            const ki  = (ky + 1) * 3 + (kx + 1);
            const kxv = Kx[ki], kyv = Ky[ki];

            if (color) {
              gxR += d[idx]   * kxv; gyR += d[idx]   * kyv;
              gxG += d[idx+1] * kxv; gyG += d[idx+1] * kyv;
              gxB += d[idx+2] * kxv; gyB += d[idx+2] * kyv;
            } else {
              // grayscale
              const gray = 0.299*d[idx] + 0.587*d[idx+1] + 0.114*d[idx+2];
              gxR += gray * kxv; gyR += gray * kyv;
            }
          }
        }

        const oi = (y * w + x) * 4;
        if (color) {
          const mR = Math.sqrt(gxR*gxR + gyR*gyR);
          const mG = Math.sqrt(gxG*gxG + gyG*gyG);
          const mB = Math.sqrt(gxB*gxB + gyB*gyB);
          od[oi]   = mR > thresh ? Math.min(255, mR) : 0;
          od[oi+1] = mG > thresh ? Math.min(255, mG) : 0;
          od[oi+2] = mB > thresh ? Math.min(255, mB) : 0;
        } else {
          const mag = Math.sqrt(gxR*gxR + gyR*gyR);
          const val = mag > thresh ? Math.min(255, mag) : 0;
          od[oi] = od[oi+1] = od[oi+2] = val;
        }
        od[oi+3] = 255;
      }
    }
  }

  /* ============================================================
     Laplacian edge detection
  ============================================================ */
  function applyLaplacian(src, dst, thresh) {
    const d  = src.data;
    const od = dst.data;
    const w  = src.width;
    const h  = src.height;
    const K  = [0, 1, 0, 1, -4, 1, 0, 1, 0];

    for (let y = 1; y < h - 1; y++) {
      for (let x = 1; x < w - 1; x++) {
        let sum = 0;
        for (let ky = -1; ky <= 1; ky++) {
          for (let kx = -1; kx <= 1; kx++) {
            const idx  = ((y + ky) * w + (x + kx)) * 4;
            const gray = 0.299*d[idx] + 0.587*d[idx+1] + 0.114*d[idx+2];
            sum += gray * K[(ky+1)*3 + (kx+1)];
          }
        }
        const oi  = (y * w + x) * 4;
        const val = Math.abs(sum) > thresh ? Math.min(255, Math.abs(sum)) : 0;
        od[oi] = od[oi+1] = od[oi+2] = val;
        od[oi+3] = 255;
      }
    }
  }

  /* ============================================================
     Start loop immediately (shows black canvas until video plays)
  ============================================================ */
  animId = requestAnimationFrame(loop);
</script>
</body>
</html>
