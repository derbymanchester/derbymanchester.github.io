<HTML>
<head>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
            gap: 14px;
        }

        h2 {
            color: #60c8ff;
            font-size: 1.4rem;
            margin: 0;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #888;
            font-size: 0.82rem;
            margin-top: 2px;
        }

        /* ---- layout: video + canvas cùng kích thước ---- */
        .display-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .panel-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #60c8ff;
        }

        video {
            width: 600px;
            height: 250px;
            background: #000;
            border: 2px solid #333;
            border-radius: 6px;
            display: block;
        }

        #mycanvas {
            border: 2px solid #60c8ff55;
            border-radius: 6px;
        }

        /* ---- controls ---- */
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px 18px;
        }

        .ctrl {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.82rem;
            color: #aaa;
        }

        select {
            padding: 4px 8px;
            background: #0f0f1a;
            color: #eee;
            border: 1px solid #444;
            border-radius: 5px;
            font-size: 0.82rem;
            cursor: pointer;
        }

        input[type="range"] {
            width: 90px;
            accent-color: #60c8ff;
            cursor: pointer;
        }

        input[type="color"] {
            width: 32px;
            height: 26px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #0f0f1a;
            padding: 2px;
            cursor: pointer;
        }

        .val {
            font-weight: 700;
            color: #60c8ff;
            min-width: 26px;
            font-size: 0.8rem;
        }

        .sep { width: 1px; height: 24px; background: #333; }

        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 7px 18px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover { opacity: 0.85; }

        #btnPlay     { background: #28a745; color: #fff; }
        #btnPause    { background: #dc3545; color: #fff; }
        #btnSnapshot { background: #60c8ff; color: #000; }

        .fps-text {
            font-size: 0.78rem;
            color: #888;
        }
        #fpsVal { color: #ffd700; font-weight: 700; }

        /* histogram nhỏ bên cạnh controls */
        #histCanvas {
            width: 160px;
            height: 48px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #000;
        }

        /* toast */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: #60c8ff;
            color: #000;
            padding: 6px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.83rem;
            opacity: 0;
            transition: opacity .3s, transform .3s;
            pointer-events: none;
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .upload-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: #0f0f1a;
            border: 1px dashed #444;
            border-radius: 8px;
        }
        .upload-area label {
            color: #60c8ff;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 700;
        }
        .upload-area label:hover { text-decoration: underline; }
        #fileInput { display: none; }
        #fileName  { color: #888; font-size: 0.8rem; }

        footer {
            color: #555;
            font-size: 0.72rem;
        }
    </style>

    <script>
        // ─── window.onload: điểm khởi đầu giống template gốc ───
        window.onload = function() {
            var video   = document.getElementById("myvideo");
            var canvas  = document.getElementById("mycanvas");
            var context = canvas.getContext("2d");

            var lastTime  = 0;
            var fpsSmooth = 0;

            // ── Upload video từ máy (mở rộng thêm so với template) ──
            document.getElementById("fileInput").addEventListener("change", function() {
                var file = this.files[0];
                if (!file) return;
                document.getElementById("fileName").textContent = file.name;
                video.src = URL.createObjectURL(file);
                video.load();
            });

            // Khi video bắt đầu phát → chạy vòng xử lý frame
            video.addEventListener("play", function() {
                requestAnimationFrame(function processFrame(ts) {
                    if (video.paused || video.ended) return;

                    // ── FPS counter ──
                    if (lastTime) {
                        var dt   = ts - lastTime;
                        fpsSmooth = fpsSmooth * 0.9 + (1000 / dt) * 0.1;
                        document.getElementById("fpsVal").textContent =
                            fpsSmooth.toFixed(1);
                    }
                    lastTime = ts;

                    // ── 1. Vẽ frame video lên canvas (giống template vẽ ảnh) ──
                    context.drawImage(video, 0, 0,
                        canvas.width, canvas.height);

                    // ── 2. Lấy ImageData (giống template) ──
                    var imageData = context.getImageData(
                        0, 0, canvas.width, canvas.height);
                    var data = imageData.data;

                    // ── 3. Xử lý pixel (mở rộng từ invertColor của template) ──
                    applyFilter(data, canvas.width, canvas.height);

                    // ── 4. Đặt lại lên canvas (giống template) ──
                    context.putImageData(imageData, 0, 0);

                    // Cập nhật histogram nhỏ
                    drawHistogram(data);

                    requestAnimationFrame(processFrame);
                });
            });
        };

        // ─── Hàm xử lý pixel – mở rộng từ invertColor() của template ───
        function applyFilter(data, w, h) {
            var filter = document.getElementById("filterSel").value;

            if (filter === "sobel" || filter === "sobel-color") {
                applySobel(data, w, h, filter === "sobel-color");
            } else if (filter === "laplacian") {
                applyLaplacian(data, w, h);
            } else if (filter === "emboss") {
                applyEmboss(data, w, h);
            } else if (filter === "invert") {
                // ── filter gốc từ template (invertColor) ──
                for (var i = 0; i < data.length; i += 4) {
                    data[i]     = 255 - data[i];     // red
                    data[i + 1] = 255 - data[i + 1]; // green
                    data[i + 2] = 255 - data[i + 2]; // blue
                    data[i + 3] = 255;               // alpha
                }
            }
        }

        // ─── Sobel edge detection ───
        function applySobel(data, w, h, useColor) {
            var thresh  = parseInt(document.getElementById("threshRange").value);
            var bright  = parseFloat(document.getElementById("brightRange").value);
            var eHex    = document.getElementById("edgeColor").value;
            var bgHex   = document.getElementById("bgColor").value;
            var eRgb    = hexToRgb(eHex);
            var bgRgb   = hexToRgb(bgHex);

            var copy = new Uint8ClampedArray(data);
            var Kx   = [-1, 0, 1, -2, 0, 2, -1, 0, 1];
            var Ky   = [-1,-2,-1,  0, 0, 0,  1, 2, 1];

            for (var y = 1; y < h - 1; y++) {
                for (var x = 1; x < w - 1; x++) {
                    var gxR=0, gyR=0, gxG=0, gyG=0, gxB=0, gyB=0;

                    for (var ky = -1; ky <= 1; ky++) {
                        for (var kx = -1; kx <= 1; kx++) {
                            var idx = ((y + ky) * w + (x + kx)) * 4;
                            var ki  = (ky + 1) * 3 + (kx + 1);
                            if (useColor) {
                                gxR += copy[idx]   * Kx[ki]; gyR += copy[idx]   * Ky[ki];
                                gxG += copy[idx+1] * Kx[ki]; gyG += copy[idx+1] * Ky[ki];
                                gxB += copy[idx+2] * Kx[ki]; gyB += copy[idx+2] * Ky[ki];
                            } else {
                                var gray = 0.299*copy[idx] + 0.587*copy[idx+1] + 0.114*copy[idx+2];
                                gxR += gray * Kx[ki];
                                gyR += gray * Ky[ki];
                            }
                        }
                    }

                    var oi = (y * w + x) * 4;
                    if (useColor) {
                        var mR = clamp(Math.sqrt(gxR*gxR + gyR*gyR) * bright);
                        var mG = clamp(Math.sqrt(gxG*gxG + gyG*gyG) * bright);
                        var mB = clamp(Math.sqrt(gxB*gxB + gyB*gyB) * bright);
                        var on = mR > thresh || mG > thresh || mB > thresh;
                        data[oi]   = on ? mR : bgRgb[0];
                        data[oi+1] = on ? mG : bgRgb[1];
                        data[oi+2] = on ? mB : bgRgb[2];
                    } else {
                        var mag = clamp(Math.sqrt(gxR*gxR + gyR*gyR) * bright);
                        var on  = mag > thresh;
                        var t   = on ? mag / 255 : 0;
                        data[oi]   = on ? lerp(bgRgb[0], eRgb[0], t) : bgRgb[0];
                        data[oi+1] = on ? lerp(bgRgb[1], eRgb[1], t) : bgRgb[1];
                        data[oi+2] = on ? lerp(bgRgb[2], eRgb[2], t) : bgRgb[2];
                    }
                    data[oi+3] = 255;
                }
            }
        }

        // ─── Laplacian edge detection ───
        function applyLaplacian(data, w, h) {
            var thresh = parseInt(document.getElementById("threshRange").value);
            var bright = parseFloat(document.getElementById("brightRange").value);
            var eRgb   = hexToRgb(document.getElementById("edgeColor").value);
            var bgRgb  = hexToRgb(document.getElementById("bgColor").value);
            var K      = [0, 1, 0, 1, -4, 1, 0, 1, 0];
            var copy   = new Uint8ClampedArray(data);

            for (var y = 1; y < h - 1; y++) {
                for (var x = 1; x < w - 1; x++) {
                    var sum = 0;
                    for (var ky = -1; ky <= 1; ky++) {
                        for (var kx = -1; kx <= 1; kx++) {
                            var idx  = ((y + ky) * w + (x + kx)) * 4;
                            var gray = 0.299*copy[idx] + 0.587*copy[idx+1] + 0.114*copy[idx+2];
                            sum += gray * K[(ky+1)*3 + (kx+1)];
                        }
                    }
                    var oi  = (y * w + x) * 4;
                    var mag = clamp(Math.abs(sum) * bright);
                    var on  = mag > thresh;
                    var t   = on ? mag / 255 : 0;
                    data[oi]   = on ? lerp(bgRgb[0], eRgb[0], t) : bgRgb[0];
                    data[oi+1] = on ? lerp(bgRgb[1], eRgb[1], t) : bgRgb[1];
                    data[oi+2] = on ? lerp(bgRgb[2], eRgb[2], t) : bgRgb[2];
                    data[oi+3] = 255;
                }
            }
        }

        // ─── Emboss filter ───
        function applyEmboss(data, w, h) {
            var bright = parseFloat(document.getElementById("brightRange").value);
            var K      = [-2,-1,0,-1,1,1,0,1,2];
            var copy   = new Uint8ClampedArray(data);

            for (var y = 1; y < h - 1; y++) {
                for (var x = 1; x < w - 1; x++) {
                    var r=0, g=0, b=0;
                    for (var ky = -1; ky <= 1; ky++) {
                        for (var kx = -1; kx <= 1; kx++) {
                            var idx = ((y + ky) * w + (x + kx)) * 4;
                            var ki  = (ky + 1) * 3 + (kx + 1);
                            r += copy[idx]   * K[ki];
                            g += copy[idx+1] * K[ki];
                            b += copy[idx+2] * K[ki];
                        }
                    }
                    var oi = (y * w + x) * 4;
                    data[oi]   = clamp((r + 128) * bright);
                    data[oi+1] = clamp((g + 128) * bright);
                    data[oi+2] = clamp((b + 128) * bright);
                    data[oi+3] = 255;
                }
            }
        }

        // ─── Histogram realtime ───
        function drawHistogram(data) {
            var hc  = document.getElementById("histCanvas");
            var hx  = hc.getContext("2d");
            var hw  = hc.width, hh = hc.height;
            var bins = new Uint32Array(32);

            for (var i = 0; i < data.length; i += 4) {
                var v = Math.floor((0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2]) / 8);
                bins[Math.min(31, v)]++;
            }
            var mx = 1;
            for (var j = 0; j < 32; j++) if (bins[j] > mx) mx = bins[j];

            hx.clearRect(0, 0, hw, hh);
            hx.fillStyle = "#000";
            hx.fillRect(0, 0, hw, hh);
            var bw = hw / 32;
            for (var k = 0; k < 32; k++) {
                var bh = (bins[k] / mx) * hh;
                var t  = k / 31;
                hx.fillStyle = "hsl(" + (200 + t*120) + ",80%," + (30 + t*50) + "%)";
                hx.fillRect(k * bw, hh - bh, bw - 1, bh);
            }
        }

        // ─── Snapshot: lưu canvas thành PNG ───
        function saveSnapshot() {
            var canvas = document.getElementById("mycanvas");
            var a      = document.createElement("a");
            var d      = new Date();
            a.download = "edge_" + d.getHours() + d.getMinutes() + d.getSeconds() + ".png";
            a.href     = canvas.toDataURL("image/png");
            a.click();
            showToast("Đã lưu ảnh!");
        }

        function showToast(msg) {
            var t = document.getElementById("toast");
            t.textContent = msg;
            t.classList.add("show");
            setTimeout(function() { t.classList.remove("show"); }, 2000);
        }

        // ─── Helpers ───
        function hexToRgb(hex) {
            return [
                parseInt(hex.slice(1,3), 16),
                parseInt(hex.slice(3,5), 16),
                parseInt(hex.slice(5,7), 16)
            ];
        }
        function lerp(a, b, t) { return Math.round(a + (b - a) * t); }
        function clamp(v)      { return Math.max(0, Math.min(255, Math.round(v))); }
    </script>
</head>
<body>
    <h2>🎬 Video Edge Detection</h2>
    <div class="subtitle">HTML5 Canvas · Sobel / Laplacian / Emboss · Real-time</div>

    <!-- Upload video từ máy -->
    <div class="upload-area">
        <label for="fileInput">📂 Chọn video từ máy</label>
        <input type="file" id="fileInput" accept="video/*" />
        <span id="fileName">chưa chọn — đang dùng video mẫu</span>
    </div>

    <!-- Video + Canvas cùng kích thước, đặt cạnh nhau -->
    <div class="display-row">
        <div class="panel">
            <div class="panel-label">🎥 Video gốc</div>
            <video id="myvideo" width="600" height="250" controls
                   crossorigin="anonymous">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4"
                        type="video/mp4" />
                Trình duyệt không hỗ trợ video.
            </video>
        </div>
        <div class="panel">
            <div class="panel-label">🔍 Biên cạnh – Canvas</div>
            <!-- Canvas cùng width/height với video -->
            <canvas id="mycanvas" width="600" height="250"></canvas>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <div class="ctrl">
            Bộ lọc:
            <select id="filterSel">
                <option value="sobel">Sobel (grayscale)</option>
                <option value="sobel-color">Sobel (màu)</option>
                <option value="laplacian">Laplacian</option>
                <option value="emboss">Emboss</option>
                <option value="invert">Invert (template gốc)</option>
            </select>
        </div>
        <div class="sep"></div>
        <div class="ctrl">
            Ngưỡng:
            <input type="range" id="threshRange" min="0" max="255" value="30"
                   oninput="document.getElementById('threshVal').textContent=this.value" />
            <span class="val" id="threshVal">30</span>
        </div>
        <div class="sep"></div>
        <div class="ctrl">
            Màu viền:
            <input type="color" id="edgeColor" value="#ffffff" />
        </div>
        <div class="ctrl">
            Màu nền:
            <input type="color" id="bgColor" value="#000000" />
        </div>
        <div class="sep"></div>
        <div class="ctrl">
            Sáng:
            <input type="range" id="brightRange" min="0.2" max="3" step="0.1" value="1"
                   oninput="document.getElementById('brightVal').textContent=parseFloat(this.value).toFixed(1)" />
            <span class="val" id="brightVal">1.0</span>
        </div>
        <div class="sep"></div>
        <div class="ctrl">
            Histogram:
            <canvas id="histCanvas" width="160" height="48"></canvas>
        </div>
    </div>

    <!-- Nút điều khiển -->
    <div class="btn-row">
        <button id="btnPlay"     onclick="document.getElementById('myvideo').play()">▶ Play</button>
        <button id="btnPause"    onclick="document.getElementById('myvideo').pause()">⏸ Pause</button>
        <button id="btnSnapshot" onclick="saveSnapshot()">📷 Chụp ảnh</button>
        <span class="fps-text">FPS: <span id="fpsVal">0</span></span>
    </div>

    <div id="toast"></div>

    <footer>HCMUS · Khoa Công Nghệ Thông Tin · Application Graphics</footer>
</body>
</HTML>
